<div class="login-container">
  <div class="login-card-wrapper">
    <mat-card class="login-card">
      <mat-card-header>
        <div class="logo-section">
          <h1 class="app-title">TNS Appraisal Portal</h1>
          <p class="app-subtitle">Employee Performance Management System</p>
        </div>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email or Employee ID</mat-label>
            <input 
              matInput 
              formControlName="loginIdentifier" 
              type="text"
              autocomplete="username"
              [disabled]="isLoading">
            <mat-icon matPrefix>person</mat-icon>
            <mat-error *ngIf="loginForm.get('loginIdentifier')?.hasError('required')">
              Email or Employee ID is required
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input 
              matInput 
              formControlName="password" 
              [type]="hidePassword ? 'password' : 'text'"
              autocomplete="current-password"
              [disabled]="isLoading">
            <mat-icon matPrefix>lock</mat-icon>
            <button 
              mat-icon-button 
              matSuffix 
              type="button"
              (click)="togglePasswordVisibility()"
              [disabled]="isLoading">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
              Password is required
            </mat-error>
          </mat-form-field>

          <div class="error-message" *ngIf="errorMessage">
            <mat-icon>error</mat-icon>
            <span>{{ errorMessage }}</span>
          </div>

          <button 
            mat-raised-button 
            color="primary" 
            type="submit" 
            class="login-button"
            [disabled]="loginForm.invalid || isLoading">
            <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
            <span *ngIf="!isLoading">Sign In</span>
          </button>
        </form>
      </mat-card-content>
    </mat-card>

    <div class="login-footer">
      <p>&copy; 2025 Think n Solutions. All rights reserved.</p>
    </div>
  </div>
</div>
