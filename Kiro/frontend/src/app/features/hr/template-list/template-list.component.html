<mat-card>
  <mat-card-header>
    <mat-card-title>Appraisal Templates</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <!-- Loading Spinner -->
    <div *ngIf="loading" class="loading-container">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Loading templates...</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="error && !loading" class="error-message">
      <mat-icon color="warn">error</mat-icon>
      <p>{{ error }}</p>
      <button mat-raised-button color="primary" (click)="loadTemplates()">
        <mat-icon>refresh</mat-icon>
        Retry
      </button>
    </div>

    <!-- Templates Table -->
    <div *ngIf="!loading && !error" class="table-container">
      <table mat-table [dataSource]="templates" class="templates-table">
        
        <!-- Version Column -->
        <ng-container matColumnDef="version">
          <th mat-header-cell *matHeaderCellDef>Version</th>
          <td mat-cell *matCellDef="let template">{{ template.version }}</td>
        </ng-container>

        <!-- Active Status Column -->
        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let template">
            <mat-chip [color]="template.isActive ? 'primary' : 'default'" selected>
              {{ template.isActive ? 'Active' : 'Inactive' }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Created Date Column -->
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Created</th>
          <td mat-cell *matCellDef="let template">{{ formatDate(template.createdAt) }}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let template">
            <button 
              mat-icon-button 
              color="primary" 
              (click)="viewTemplate(template)"
              matTooltip="View Template">
              <mat-icon>visibility</mat-icon>
            </button>
            
            <button 
              *ngIf="!template.isActive"
              mat-icon-button 
              color="accent" 
              (click)="activateTemplate(template)"
              matTooltip="Activate Template">
              <mat-icon>check_circle</mat-icon>
            </button>
            
            <button 
              *ngIf="template.isActive"
              mat-icon-button 
              color="warn" 
              (click)="deactivateTemplate(template)"
              matTooltip="Deactivate Template">
              <mat-icon>cancel</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- No Data Row -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
            <mat-icon>info</mat-icon>
            <p>No templates found</p>
          </td>
        </tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
