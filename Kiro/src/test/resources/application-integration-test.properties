# Integration test configuration using H2 in-memory database

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - let Hibernate create schema from entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Disable Flyway for integration tests (Hibernate creates schema from entities)
spring.flyway.enabled=false

# Session Configuration
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# Mail - disable for tests
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Logging - reduce noise in tests
logging.level.com.tns.appraisal=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# PDF Storage Path
appraisal.pdf.storage.path=./test-appraisal-pdfs
