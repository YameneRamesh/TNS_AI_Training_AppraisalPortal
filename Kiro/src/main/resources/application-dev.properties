# Development Environment Configuration

# Database Configuration (MS SQL Server - Development)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=appraisal_db_dev;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=DevPassword123

# JPA Configuration - Development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Session Configuration - Development
server.servlet.session.cookie.secure=false

# Mail Configuration - Development (use MailHog or similar)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Logging - Development
logging.level.com.tns.appraisal=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# PDF Storage Path - Development
appraisal.pdf.storage.path=./dev-appraisal-pdfs
