# JPA Configuration - Development
# Using 'none' instead of 'update' because SQL Server default constraints
# block Hibernate's column type alterations (datetime2 vs datetimeoffset).
# Schema is managed manually; Hibernate should not modify it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

