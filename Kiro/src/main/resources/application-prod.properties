# Production Environment Configuration

# Database Configuration (MS SQL Server - Production)
# IMPORTANT: Override these values using environment variables or external configuration
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:appraisal_db};encrypt=true;trustServerCertificate=false
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}

# Connection Pool Configuration - Production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# JPA Configuration - Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Session Configuration - Production
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Mail Configuration - Production
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Logging - Production
logging.level.com.tns.appraisal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# PDF Storage Path - Production
appraisal.pdf.storage.path=${PDF_STORAGE_PATH:/var/appraisal/pdfs}

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never
